<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Taquería Nueva Orden — POS</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* Taquería Nueva Orden — verde bosque + crema */
  --brand-green:     #365322;
  --brand-green-dk:  #243718;
  --brand-green-lt:  #4a6b30;
  --brand-cream:     #FDF8D0;
  --brand-cream-dk:  #e8dfa2;
  --brand-cream-lt:  #fffceb;

  /* Alias legacy (mantenidos para no romper nada) */
  --brand-red:       var(--brand-green);
  --brand-red-dk:    var(--brand-green-dk);
  --brand-red-lt:    var(--brand-green-lt);
  --brand-yellow:    var(--brand-cream);
  --brand-yellow-dk: var(--brand-cream-dk);
  --brand-yellow-lt: var(--brand-cream-lt);

  /* UI */
  --bg:       #f7f3e3;
  --surface:  #ffffff;
  --surface2: #f0ebd6;
  --border:   #e1d8b8;
  --border2:  #c8bb8f;
  --text:     #2a3518;
  --text2:    #5c6648;
  --text3:    #8a9175;

  --green:    #5d7a3f;--green-bg:#edf2dc;--green-border:rgba(93,122,63,.3);
  --amber:    #a07600;--amber-bg:#fbf4d6;--amber-border:rgba(160,118,0,.3);
  --red:      #a44a2a;--red-bg:#f5e6dc;--red-border:rgba(164,74,42,.3);

  --r:10px;--r-lg:14px;--r-xl:20px;
  --shadow:0 1px 6px rgba(36,55,24,.08);
  --shadow-md:0 4px 16px rgba(36,55,24,.12);
  --shadow-lg:0 8px 32px rgba(36,55,24,.18);
  --topbar-h:56px;
  --bottomnav-h:60px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'Jost','Futura','Century Gothic',sans-serif;font-size:15px;letter-spacing:.1px;}
button{font-family:'Jost','Futura','Century Gothic',sans-serif;cursor:pointer;letter-spacing:.2px;}
input,select,textarea{font-family:'Jost','Futura','Century Gothic',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideRight{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes stockFlash{0%{background:#dde8c8}100%{background:var(--surface)}}

.fade-up{animation:fadeUp .22s ease both;}
.fade-in{animation:fadeIn .18s ease both;}

/* ─── LAYOUT ───────────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden;background:var(--bg);}

/* TOPBAR */
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  background:var(--brand-green);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:12px;
  box-shadow:0 2px 8px rgba(36,55,24,.35);
  position:relative;z-index:50;
}
.topbar-brand{
  display:flex;flex-direction:column;line-height:1;
  font-family:'Jost','Futura',sans-serif;color:var(--brand-cream);
  letter-spacing:.5px;flex-shrink:0;
}
.topbar-brand .t1{font-size:11px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;opacity:.85;}
.topbar-brand .t2{font-size:16px;font-weight:700;letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
.topbar-center{flex:1;display:flex;justify-content:center;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.sync-dot{width:8px;height:8px;border-radius:50%;transition:background .3s;}
.sync-dot.ok{background:#b8d88f;box-shadow:0 0 6px #b8d88f;}
.sync-dot.err{background:#e08060;}
.sync-dot.loading{background:var(--brand-cream);animation:pulse 1s infinite;}
.topbar-clock{font-size:13px;color:rgba(253,248,208,.85);font-family:'Jost',sans-serif;letter-spacing:1px;font-weight:400;}
.topbar-user{display:flex;align-items:center;gap:6px;background:rgba(253,248,208,.12);padding:4px 10px;border-radius:99px;cursor:pointer;border:1px solid rgba(253,248,208,.15);}
.topbar-user-lbl{font-size:12px;color:rgba(253,248,208,.95);font-weight:500;letter-spacing:.3px;}
.topbar-suc-name{font-size:12px;color:rgba(253,248,208,.75);letter-spacing:.5px;}

/* BOTTOM NAV (mobile) */
.bottom-nav{
  display:none;
  height:var(--bottomnav-h);flex-shrink:0;
  background:var(--brand-green);
  border-top:2px solid var(--brand-green-dk);
  position:relative;z-index:50;
}
.bottom-nav-inner{display:flex;height:100%;}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;background:transparent;border:none;color:rgba(253,248,208,.55);
  font-size:10px;font-weight:500;padding:6px 4px;transition:all .15s;position:relative;letter-spacing:.4px;
}
.bnav-btn.active{color:var(--brand-cream);}
.bnav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--brand-cream);border-radius:2px 2px 0 0;}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 14px);width:16px;height:16px;border-radius:50%;background:var(--brand-cream);color:var(--brand-green-dk);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* DESKTOP NAV */
.desktop-nav{display:flex;gap:2px;}
.dnav-btn{
  padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;
  border:none;background:transparent;color:rgba(253,248,208,.6);
  transition:all .15s;position:relative;letter-spacing:.3px;
}
.dnav-btn:hover{color:var(--brand-cream);background:rgba(253,248,208,.1);}
.dnav-btn.active{background:var(--brand-cream);color:var(--brand-green-dk);font-weight:600;}
.dnav-badge{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--brand-green-dk);color:var(--brand-cream);font-size:9px;font-weight:700;margin-left:4px;vertical-align:middle;}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;min-height:0;}
.panel{flex:1;overflow-y:auto;padding:16px;}
@media(min-width:768px){.panel{padding:20px 24px;}}

/* RESPONSIVE BREAKPOINTS */
@media(max-width:767px){
  .bottom-nav{display:block;}
  .desktop-nav{display:none;}
  .topbar-suc-name{display:none;}
  .stats-row{grid-template-columns:1fr 1fr!important;}
  .mesas-grid{grid-template-columns:repeat(3,1fr)!important;}
  .orden-layout{grid-template-columns:1fr!important;height:auto!important;}
  .sidebar{max-height:60vh;}
  .menu-grid{grid-template-columns:1fr!important;}
  .inv-table th:nth-child(4),.inv-table td:nth-child(4){display:none;}
  .menu-admin-grid{grid-template-columns:1fr!important;}
  .rep-charts{grid-template-columns:1fr!important;}
  .admin-grid{grid-template-columns:1fr!important;}
  .mos-layout{grid-template-columns:1fr!important;height:auto!important;}
  .mos-menu-grid{grid-template-columns:repeat(2,1fr)!important;}
  /* Ticket más legible en móvil */
  .mos-sidebar{min-height:auto!important;}
  .mos-order{max-height:300px!important;flex:none!important;}
  .mos-sidebar-ttl{font-size:14px!important;letter-spacing:2.2px!important;}
  .mos-sidebar-sub{font-size:22px!important;}
  .mos-order .ol-name{font-size:17px!important;}
  .mos-order .ol-price{font-size:17px!important;min-width:70px!important;}
  .mos-order .ol-qty{font-size:18px!important;min-width:32px!important;}
  .mos-order .ol-btn{width:36px!important;height:36px!important;font-size:20px!important;}
  .mos-total-lbl{font-size:14px!important;}
  .mos-total-val{font-size:36px!important;}
  .mos-btn-cobrar{font-size:18px!important;padding:18px!important;}
  .mos-hist-row{font-size:15px!important;padding:10px 12px!important;}
  .mos-hist-time{font-size:13px!important;}
  .mos-ticket{font-size:13px!important;padding:7px 16px!important;}
  .mos-ticket b{font-size:18px!important;}
}
@media(max-width:400px){
  .mesas-grid{grid-template-columns:repeat(2,1fr)!important;}
}

/* ─── COMPONENTS ──────────────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--surface);border-radius:var(--r-lg);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow);}
.stat-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);margin-bottom:4px;font-weight:600;}
.stat-value{font-family:'Jost',sans-serif;font-size:26px;font-weight:700;color:var(--brand-green);line-height:1;letter-spacing:-.5px;}
.stat-value.yellow{color:var(--amber);}
.stat-value.green{color:var(--green);}
.stat-value.red{color:var(--red);}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px;}

.sec-hdr{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin:16px 0 10px;display:flex;align-items:center;justify-content:space-between;}
.sec-hdr-action{font-size:12px;color:var(--brand-green);font-weight:600;cursor:pointer;background:none;border:none;text-transform:none;letter-spacing:0;}

/* Badges */
.badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.5px;}
.badge-libre{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.badge-ocupada{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge-cuenta{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}

/* Buttons */
.btn{padding:10px 18px;border-radius:var(--r);border:none;font-size:14px;font-weight:600;transition:all .15s;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.3px;}
.btn-primary{background:var(--brand-green);color:var(--brand-cream);box-shadow:0 3px 10px rgba(36,55,24,.3);}
.btn-primary:hover{background:var(--brand-green-dk);}
.btn-primary:active{transform:scale(.97);}
.btn-yellow{background:var(--brand-cream);color:var(--brand-green-dk);box-shadow:0 3px 10px rgba(232,223,162,.45);border:1px solid var(--brand-cream-dk);}
.btn-yellow:hover{background:var(--brand-cream-dk);color:var(--brand-green-dk);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--brand-green);color:var(--brand-green);}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-border);}
.btn-danger:hover{background:var(--red-bg);}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}
.btn-icon{width:32px;height:32px;padding:0;border-radius:8px;font-size:16px;border:1px solid var(--border);background:var(--surface);color:var(--text2);}
.btn-icon:hover{border-color:var(--brand-green);color:var(--brand-green);}

/* Form fields */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;transition:border .15s;font-family:'Jost',sans-serif;}
.field input:focus,.field select:focus{outline:none;border-color:var(--brand-green);}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Card */
.card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px;}

/* ─── LOGIN ─────────────────────────────────────────────────────── */
.login-screen{
  min-height:100dvh;background:var(--brand-green);
  background-image:radial-gradient(ellipse at top,var(--brand-green-lt) 0%,var(--brand-green) 55%,var(--brand-green-dk) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .t1{font-family:'Jost',sans-serif;font-size:17px;font-weight:400;color:rgba(253,248,208,.7);letter-spacing:6px;text-transform:uppercase;}
.login-logo .t2{font-family:'Jost',sans-serif;font-size:44px;font-weight:700;color:var(--brand-cream);letter-spacing:4px;line-height:1;margin-top:6px;text-transform:uppercase;}
.login-logo .t-sep{width:60px;height:2px;background:var(--brand-cream-dk);margin:10px auto;opacity:.6;}
.login-card{background:var(--surface);border-radius:var(--r-xl);padding:28px;width:100%;max-width:340px;box-shadow:var(--shadow-lg);}
.login-title{font-family:'Jost',sans-serif;font-size:19px;font-weight:600;color:var(--brand-green);text-align:center;margin-bottom:6px;letter-spacing:.5px;}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:24px;}
.pin-tabs{display:flex;gap:6px;margin-bottom:20px;}
.pin-tab{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;letter-spacing:.3px;}
.pin-tab.active{background:var(--brand-green);color:var(--brand-cream);border-color:var(--brand-green);}
.pin-display{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--bg);border-radius:var(--r);padding:16px;margin-bottom:16px;
  border:1.5px solid var(--border);
}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .2s;}
.pin-dot.filled{background:var(--brand-green);border-color:var(--brand-green);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{
  padding:16px;border-radius:var(--r);border:1.5px solid var(--border);
  background:var(--surface);font-size:20px;font-weight:500;color:var(--text);
  transition:all .12s;
}
.pin-key:hover{border-color:var(--brand-green);color:var(--brand-green);}
.pin-key:active{transform:scale(.94);background:var(--bg);}
.pin-key.del{color:var(--text3);}
.pin-key.enter{background:var(--brand-green);color:var(--brand-cream);border-color:var(--brand-green);}
.pin-key.enter:hover{background:var(--brand-green-dk);}
.pin-error{font-size:13px;color:var(--red);text-align:center;margin-top:12px;font-weight:500;}
.login-suc-select{margin-bottom:20px;}
.login-credit{margin-top:24px;text-align:center;font-size:10px;color:rgba(253,248,208,.55);letter-spacing:2px;text-transform:uppercase;font-weight:400;}
.login-credit b{color:var(--brand-cream);font-weight:600;letter-spacing:2.5px;}

/* ─── MESAS ─────────────────────────────────────────────────────── */
.mesas-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.mesa-card{
  background:var(--surface);border-radius:var(--r-lg);padding:14px 12px 12px;
  cursor:pointer;border:2px solid var(--border);box-shadow:var(--shadow);
  transition:all .18s;text-align:center;position:relative;overflow:hidden;
}
.mesa-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.mesa-card.libre{border-color:var(--green-border);}
.mesa-card.ocupada{border-color:var(--amber-border);}
.mesa-card.cuenta{border-color:var(--red-border);}
.mesa-strip{position:absolute;top:0;left:0;right:0;height:3px;}
.libre .mesa-strip{background:var(--green);}
.ocupada .mesa-strip{background:var(--amber);}
.cuenta .mesa-strip{background:var(--red);}
.mesa-dot{width:7px;height:7px;border-radius:50%;margin:0 auto 6px;}
.libre .mesa-dot{background:var(--green);box-shadow:0 0 6px var(--green);}
.ocupada .mesa-dot{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 2s infinite;}
.cuenta .mesa-dot{background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1s infinite;}
.mesa-num{font-family:'Jost',sans-serif;font-size:28px;font-weight:700;line-height:1;margin-bottom:2px;letter-spacing:-1px;}
.libre .mesa-num{color:var(--green);}
.ocupada .mesa-num{color:var(--amber);}
.cuenta .mesa-num{color:var(--red);}
.mesa-nombre{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:2px;text-transform:uppercase;letter-spacing:.6px;}
.mesa-lbl{font-size:11px;font-weight:500;letter-spacing:.4px;}
.libre .mesa-lbl{color:var(--green);}
.ocupada .mesa-lbl{color:var(--amber);}
.cuenta .mesa-lbl{color:var(--red);}
.mesa-pendiente{margin-top:6px;padding:4px 6px;border-radius:6px;background:var(--amber-bg);display:inline-block;}
.mesa-pendiente-lbl{font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.mesa-pendiente-val{font-family:'Jost',sans-serif;font-size:15px;font-weight:600;color:var(--amber);}
.mesa-cobrado{font-size:10px;color:var(--green);margin-top:2px;font-weight:500;}

/* ─── ORDEN ─────────────────────────────────────────────────────── */
.orden-layout{display:grid;grid-template-columns:1fr 340px;gap:14px;height:calc(100dvh - var(--topbar-h) - 40px);}
.orden-menu-col{overflow-y:auto;padding-right:2px;}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:13px;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;margin-bottom:12px;box-shadow:var(--shadow);}
.back-btn:hover{border-color:var(--brand-green);color:var(--brand-green);}
.orden-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.orden-title{font-family:'Jost',sans-serif;font-size:20px;font-weight:600;letter-spacing:.5px;}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.menu-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;transition:all .15s;box-shadow:var(--shadow);}
.menu-card.disponible{cursor:pointer;}.menu-card.disponible:hover{border-color:var(--brand-green-lt);background:var(--green-bg);}
.menu-card.stock-bajo{border-color:var(--amber-border);background:#fbf8e4;cursor:pointer;}.menu-card.stock-bajo:hover{border-color:var(--amber);}
.menu-card.sin-stock{opacity:.5;cursor:not-allowed;border-color:var(--red-border);background:var(--red-bg);}
.mc-info{flex:1;min-width:0;}
.mc-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-price{font-family:'Jost',sans-serif;font-size:14px;font-weight:700;color:var(--brand-green);margin-top:1px;}
.mc-stock{font-size:10px;margin-top:2px;font-weight:600;letter-spacing:.3px;}
.mc-stock.ok{color:var(--green)}.mc-stock.bajo{color:var(--amber)}.mc-stock.agotado{color:var(--red)}
.mc-add{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:var(--brand-green);border:none;color:var(--brand-cream);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700;line-height:1;margin-left:8px;}
.mc-add:hover{background:var(--brand-green-dk);transform:scale(1.08);}
.mc-add:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none;}

/* Sidebar */
.sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-md);}
.sidebar-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--brand-green);}
.sidebar-hdr-title{font-family:'Jost',sans-serif;font-size:14px;font-weight:600;color:var(--brand-cream);letter-spacing:1px;text-transform:uppercase;}
.btn-pide{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:500;background:rgba(253,248,208,.15);color:var(--brand-cream);border:1px solid rgba(253,248,208,.28);cursor:pointer;transition:all .15s;letter-spacing:.3px;}
.btn-pide:hover{background:rgba(253,248,208,.25);}
.personas-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.personas-lbl{font-size:12px;color:var(--text3);font-weight:500;}
.personas-ctrl{display:flex;align-items:center;gap:6px;margin-left:auto;}
.p-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.p-btn:hover{border-color:var(--brand-green);color:var(--brand-green);}
.p-num{font-family:'Jost',sans-serif;font-size:16px;font-weight:700;color:var(--brand-green);min-width:20px;text-align:center;}
.sep-row{padding:6px 14px;border-bottom:1px solid var(--border);}
.sep-btn{width:100%;padding:6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;transition:all .15s;}
.sep-btn:hover{border-color:var(--amber);color:var(--amber);}
.sep-btn.on{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border);font-weight:600;}
.order-lines{flex:1;overflow-y:auto;padding:6px 14px;}
.order-line{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);}
.ol-name{flex:1;font-size:13px;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ol-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.ol-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ol-btn:hover{border-color:var(--brand-green);color:var(--brand-green);}
.ol-qty{font-size:13px;font-weight:600;min-width:18px;text-align:center;}
.ol-price{font-family:'Jost',sans-serif;font-size:13px;font-weight:700;color:var(--brand-green);min-width:44px;text-align:right;}
.empty-msg{font-size:13px;color:var(--text3);text-align:center;padding:20px 0;}
.sidebar-footer{padding:12px 14px;border-top:2px solid var(--border);}
.footer-desglose{background:var(--surface2);border-radius:var(--r);padding:8px 10px;margin-bottom:10px;font-size:12px;}
.footer-row{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;}
.footer-row .lbl{color:var(--text3);}
.footer-row .val{font-family:'Jost',sans-serif;font-weight:700;}
.footer-row .val.cobrado{color:var(--green);}
.footer-row .val.pendiente{color:var(--brand-green);font-size:17px;}
.footer-row .val.total-fx{color:var(--text);font-size:16px;}
.footer-divider{border:none;border-top:1px solid var(--border);margin:4px 0;}

/* Cuentas separadas */
.csep{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.ctabs{display:flex;gap:3px;padding:8px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--surface2);}
.ctab{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text3);transition:all .15s;}
.ctab:hover{color:var(--text);}
.ctab.active{background:var(--brand-green);color:var(--brand-cream);border-color:var(--brand-green);font-weight:600;}
.ctab.pagada{background:var(--green-bg);color:var(--green);border-color:var(--green-border);text-decoration:line-through;opacity:.7;}
.sin-asignar{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--amber-bg);}
.sa-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--amber);font-weight:700;margin-bottom:5px;}
.sa-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(160,118,0,.1);}
.sa-item:last-child{border:none;}
.sa-name{flex:1;font-size:12px;}
.sa-disp{font-size:10px;color:var(--text3);}
.btn-asignar{padding:2px 8px;border-radius:5px;font-size:11px;background:var(--brand-green);color:var(--brand-cream);border:none;font-weight:600;transition:all .15s;}
.btn-asignar:hover{background:var(--brand-green-dk);}
.todo-ok{font-size:12px;color:var(--green);font-weight:600;}
.cuenta-lines{flex:1;overflow-y:auto;padding:6px 14px;}
.csep-footer{padding:10px 14px;border-top:1px solid var(--border);}
.ctotal-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.ctotal-lbl{font-size:12px;color:var(--text3);}
.ctotal-val{font-family:'Jost',sans-serif;font-size:18px;font-weight:700;color:var(--brand-green);}
.btn-cobrar-cuenta{width:100%;padding:9px;border-radius:var(--r);border:none;background:var(--brand-green);color:var(--brand-cream);font-size:13px;font-weight:700;transition:all .15s;box-shadow:0 3px 8px rgba(36,55,24,.3);letter-spacing:.3px;}
.btn-cobrar-cuenta:hover{background:var(--brand-green-dk);}
.btn-cobrar-cuenta:disabled{background:var(--border);color:var(--text3);cursor:default;box-shadow:none;}

/* ─── MOSTRADOR ─────────────────────────────────────────────────── */
.mos-layout{display:grid;grid-template-columns:1fr 380px;gap:16px;height:calc(100dvh - var(--topbar-h) - 40px);}
.mos-menu-col{overflow-y:auto;padding-right:4px;}
.mos-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.mos-title{font-family:'Jost',sans-serif;font-size:22px;font-weight:600;color:var(--brand-green);letter-spacing:.5px;}
.mos-ticket{margin-left:auto;display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:var(--r);background:var(--brand-green);color:var(--brand-cream);font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:500;}
.mos-ticket b{font-family:'Jost',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;}
.mos-menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(min-width:1200px){.mos-menu-grid{grid-template-columns:repeat(4,1fr);}}
.mos-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-lg);padding:14px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;transition:all .15s;box-shadow:var(--shadow);min-height:110px;cursor:pointer;font-family:'Jost',sans-serif;}
.mos-card:hover{border-color:var(--brand-green);background:var(--green-bg);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.mos-card:active{transform:scale(.97);}
.mos-card.sin-stock{opacity:.45;cursor:not-allowed;border-color:var(--red-border);background:var(--red-bg);}
.mos-card.sin-stock:hover{transform:none;}
.mos-emoji{font-size:32px;line-height:1;}
.mos-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.2;letter-spacing:.2px;}
.mos-price{font-family:'Jost',sans-serif;font-size:17px;font-weight:700;color:var(--brand-green);letter-spacing:-.3px;}
.mos-stock{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.mos-stock.bajo{color:var(--amber);}
.mos-stock.agotado{color:var(--red);}
.mos-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-md);}
.mos-sidebar-hdr{padding:14px 16px;background:var(--brand-green);color:var(--brand-cream);}
.mos-sidebar-ttl{font-family:'Jost',sans-serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:500;opacity:.85;}
.mos-sidebar-sub{font-family:'Jost',sans-serif;font-size:18px;font-weight:600;margin-top:2px;letter-spacing:.5px;}
.mos-order{flex:1;overflow-y:auto;padding:10px 16px;}
.mos-order .order-line{padding:12px 0;gap:10px;border-bottom:1px solid var(--border);}
.mos-order .ol-name{font-size:15px;font-weight:500;letter-spacing:.2px;}
.mos-order .ol-btn{width:32px;height:32px;border-radius:8px;font-size:18px;font-weight:600;}
.mos-order .ol-qty{font-size:16px;font-weight:700;min-width:28px;color:var(--brand-green);}
.mos-order .ol-price{font-size:15px;min-width:60px;font-weight:700;}
.mos-footer{padding:14px 16px;border-top:2px solid var(--border);background:var(--surface2);}
.mos-total-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
.mos-total-lbl{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:600;}
.mos-total-val{font-family:'Jost',sans-serif;font-size:32px;font-weight:700;color:var(--brand-green);letter-spacing:-1px;}
.mos-btn-cobrar{width:100%;padding:16px;border-radius:var(--r-lg);border:none;background:var(--brand-green);color:var(--brand-cream);font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .15s;box-shadow:0 4px 14px rgba(36,55,24,.35);font-family:'Jost',sans-serif;}
.mos-btn-cobrar:hover{background:var(--brand-green-dk);}
.mos-btn-cobrar:active{transform:scale(.98);}
.mos-btn-cobrar:disabled{background:var(--border);color:var(--text3);cursor:default;box-shadow:none;}
.mos-btn-cancel{width:100%;padding:9px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;margin-top:8px;transition:all .15s;letter-spacing:.5px;}
.mos-btn-cancel:hover{border-color:var(--red);color:var(--red);}
.mos-history{margin-top:18px;}
.mos-hist-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.mos-hist-row:last-child{border:none;}
.mos-hist-tkt{font-family:'Jost',sans-serif;font-weight:600;color:var(--text);letter-spacing:.5px;}
.mos-hist-time{font-size:11px;color:var(--text3);}
.mos-hist-total{font-family:'Jost',sans-serif;font-weight:700;color:var(--brand-green);}

/* ─── INVENTARIO ─────────────────────────────────────────────────── */
.inv-alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.inv-alert{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:var(--r);font-size:13px;border:1px solid;}
.inv-alert.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red);}
.inv-alert.warning{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber);}
.inv-alert b{display:block;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px;}
.inv-table{width:100%;border-collapse:separate;border-spacing:0 3px;}
.inv-table th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:3px 12px 8px;text-align:left;font-weight:700;}
.inv-tr td{padding:9px 12px;background:var(--surface);font-size:13px;vertical-align:middle;}
.inv-tr td:first-child{border-radius:var(--r) 0 0 var(--r);}
.inv-tr td:last-child{border-radius:0 var(--r) var(--r) 0;text-align:center;}
.inv-tr.row-danger td{background:#f9ede3;}
.inv-tr.row-warning td{background:#fbf8e4;}
.inv-tr.just-updated td{animation:stockFlash 1.2s ease;}
.inv-badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.inv-badge.ok{background:var(--green-bg);color:var(--green);}
.inv-badge.low{background:var(--amber-bg);color:var(--amber);}
.inv-badge.out{background:var(--red-bg);color:var(--red);}
.stock-bar-wrap{display:flex;align-items:center;gap:6px;}
.stock-bar-track{width:50px;height:5px;background:var(--border);border-radius:99px;overflow:hidden;flex-shrink:0;}
.stock-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.stock-bar-fill.ok{background:var(--green)}.stock-bar-fill.low{background:var(--amber)}.stock-bar-fill.out{background:var(--red)}
.inv-input{width:62px;padding:4px 7px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-size:13px;text-align:center;}
.inv-input:focus{outline:none;border-color:var(--brand-green);}
.inv-del{background:none;border:none;color:var(--border2);font-size:18px;padding:2px 5px;border-radius:5px;transition:all .15s;line-height:1;}
.inv-del:hover{color:var(--red);background:var(--red-bg);}

/* ─── CAJA ──────────────────────────────────────────────────────── */
.tx-group{margin-bottom:12px;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);}
.tx-group-hdr{background:var(--surface2);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.tx-group-mesa{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.3px;}
.tx-group-fecha{font-size:11px;color:var(--text3);}
.tx-group-total{font-family:'Jost',sans-serif;font-size:16px;font-weight:700;color:var(--brand-green);}
.tx-sub-row{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1px solid var(--border);}
.tx-sub-row:last-child{border:none;}
.tx-sub-info{font-size:12px;color:var(--text2);}
.tx-sub-det{font-size:11px;color:var(--text3);}
.tx-sub-amt{font-family:'Jost',sans-serif;font-size:14px;font-weight:700;color:var(--text2);}

/* ─── REPORTES ──────────────────────────────────────────────────── */
.rep-charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.rep-chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow);}
.rep-chart-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;}
.bar-chart{display:flex;flex-direction:column;gap:8px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:12px;color:var(--text2);min-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden;}
.bar-fill{height:100%;background:var(--brand-green);border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.bar-fill.yellow{background:var(--amber);}
.bar-val{font-family:'Jost',sans-serif;font-size:13px;font-weight:700;color:var(--brand-green);min-width:40px;text-align:right;}
.donut-wrap{display:flex;align-items:center;gap:16px;}
.donut-svg{flex-shrink:0;}
.donut-legend{display:flex;flex-direction:column;gap:6px;}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
.donut-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.hourly-chart{display:flex;align-items:flex-end;gap:4px;height:80px;}
.hourly-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.hourly-bar{background:var(--brand-green);border-radius:3px 3px 0 0;width:100%;transition:height .5s;}
.hourly-bar-lbl{font-size:9px;color:var(--text3);}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px;text-align:center;box-shadow:var(--shadow);}
.kpi-val{font-family:'Jost',sans-serif;font-size:22px;font-weight:700;color:var(--brand-green);letter-spacing:-.5px;}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-top:2px;font-weight:600;}

/* ─── REPORTE RANGO ─────────────────────────────────────────────── */
.rep-range-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:10px 14px;box-shadow:var(--shadow);}
.rep-range-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:600;margin-right:4px;}
.rep-range-tabs{display:flex;gap:4px;}
.rep-range-tab{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:500;transition:all .15s;letter-spacing:.4px;}
.rep-range-tab:hover{border-color:var(--brand-green);color:var(--brand-green);}
.rep-range-tab.active{background:var(--brand-green);color:var(--brand-cream);border-color:var(--brand-green);font-weight:600;}
.rep-range-info{margin-left:auto;display:flex;align-items:center;gap:10px;}
.rep-range-dates{font-size:12px;color:var(--text3);letter-spacing:.3px;}
.rep-pdf-btn{padding:8px 16px;border-radius:8px;border:none;background:var(--brand-green);color:var(--brand-cream);font-size:12px;font-weight:600;letter-spacing:.6px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(36,55,24,.25);}
.rep-pdf-btn:hover{background:var(--brand-green-dk);}
.rep-pdf-btn:active{transform:scale(.97);}
@media(max-width:767px){.rep-range-info{margin-left:0;width:100%;justify-content:space-between;}}

/* ─── ADMIN ─────────────────────────────────────────────────────── */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.admin-section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow);}
.admin-section-title{font-family:'Jost',sans-serif;font-size:15px;font-weight:600;color:var(--brand-green);margin-bottom:12px;display:flex;align-items:center;gap:8px;letter-spacing:.5px;}
.admin-list-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.admin-list-item:last-child{border:none;}
.admin-item-info{flex:1;}
.admin-item-name{font-weight:500;}
.admin-item-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.admin-item-actions{display:flex;gap:4px;}
.pin-reset-form{background:var(--surface2);border-radius:var(--r);padding:12px;margin-top:8px;}

/* Menú admin */
.menu-admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.menu-admin-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
.mac-info{flex:1;min-width:0;}
.mac-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mac-price{font-family:'Jost',sans-serif;font-size:14px;color:var(--brand-green);font-weight:700;}
.mac-inv{font-size:10px;color:var(--text3);margin-top:2px;}
.mac-del{background:none;border:none;color:var(--border2);font-size:17px;padding:2px 4px;border-radius:5px;transition:all .15s;line-height:1;margin-left:6px;flex-shrink:0;}
.mac-del:hover{color:var(--red);background:var(--red-bg);}

/* ─── SUCURSALES ────────────────────────────────────────────────── */
.suc-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);margin-bottom:8px;}
.suc-info{flex:1;}
.suc-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:.3px;}
.suc-ciudad{font-size:12px;color:var(--text3);margin-top:2px;}
.suc-actions{display:flex;gap:6px;}
.cloud-info{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--amber);}
.cloud-info b{display:block;font-weight:700;margin-bottom:4px;}
.cloud-steps{margin-top:8px;padding-left:16px;color:var(--text2);font-size:12px;line-height:1.8;}

/* Créditos */
.credit-card{background:var(--brand-green);color:var(--brand-cream);border-radius:var(--r-lg);padding:16px;text-align:center;box-shadow:var(--shadow);}
.credit-lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;opacity:.7;margin-bottom:4px;}
.credit-name{font-family:'Jost',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;}
.credit-sub{font-size:11px;opacity:.8;margin-top:6px;letter-spacing:.6px;}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--brand-green);border-radius:50%;animation:spin .8s linear infinite;}
.loading-txt{font-size:14px;color:var(--text3);letter-spacing:.3px;}

/* Toast */
.toast-wrap{position:fixed;bottom:calc(var(--bottomnav-h) + 12px);left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;}
@media(min-width:768px){.toast-wrap{bottom:24px;}}
.toast{background:var(--text);color:var(--brand-cream);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;animation:toastIn .25s ease both;box-shadow:var(--shadow-lg);white-space:nowrap;letter-spacing:.3px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.warning{background:var(--amber);}

/* Utils */
.add-form-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-top:12px;box-shadow:var(--shadow-md);animation:fadeUp .2s ease both;}
.add-form-title{font-family:'Jost',sans-serif;font-size:15px;font-weight:600;color:var(--brand-green);margin-bottom:12px;letter-spacing:.3px;}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

// ── API ───────────────────────────────────────────────────────────
// 4xx server-side aún devuelve JSON con {error:...}; solo lanza en errores de red / 5xx
const _check=r=>{ if(r.status>=500) throw new Error('HTTP '+r.status); return r.json(); };
const api={
  get:(u)=>fetch(u).then(_check),
  post:(u,b)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(_check),
  put:(u,b)=>fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(_check),
  del:(u)=>fetch(u,{method:'DELETE'}).then(_check),
};
const S=(id,path,body,method='GET')=>{
  const url=`/api/suc/${id}${path}`;
  if(method==='GET') return api.get(url);
  if(method==='POST') return api.post(url,body);
  if(method==='PUT') return api.put(url,body);
  if(method==='DELETE') return api.del(url);
};

// ── Toast ─────────────────────────────────────────────────────────
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div className="toast-wrap"><div className={`toast ${type}`}>{msg}</div></div>;
}

// ── Clock ─────────────────────────────────────────────────────────
function Clock(){
  const [t,setT]=useState('');
  useEffect(()=>{
    const f=()=>new Date().toLocaleTimeString('es-GT',{hour:'2-digit',minute:'2-digit'});
    setT(f());const id=setInterval(()=>setT(f()),1000);return()=>clearInterval(id);
  },[]);
  return <span className="topbar-clock">{t}</span>;
}

// ── Brand ─────────────────────────────────────────────────────────
function Brand(){
  return(
    <div className="topbar-brand">
      <div className="t1">Taquería</div>
      <div className="t2">Nueva Orden</div>
    </div>
  );
}

// ── PIN Login ─────────────────────────────────────────────────────
const ROLES=[{key:'cajero',label:'Cajero'},{key:'admin',label:'Admin'}];
function LoginScreen({onLogin, sucursales}){
  const [rol,setRol]=useState('cajero');
  const [sucId,setSucId]=useState(sucursales[0]?.id||null);
  const [pin,setPin]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  // Sincroniza sucId cuando la lista de sucursales termina de cargar
  useEffect(()=>{
    if(sucursales.length===0) return;
    if(!sucId || !sucursales.find(s=>s.id===sucId)){
      setSucId(sucursales[0].id);
    }
  },[sucursales]);

  async function tryPin(p){
    if(p.length<4) return;
    if(!sucId){ setError('Cargando sucursales…'); return; }
    setLoading(true);setError('');
    try{
      const r=await api.post('/api/auth',{pin:p,rol});
      if(r.ok){onLogin({rol,sucId:parseInt(sucId)});}
      else{setError('PIN incorrecto');setPin('');}
    }catch{setError('Error de conexión');}
    setLoading(false);
  }

  function press(k){
    if(loading) return;
    if(k==='del'){setPin(p=>p.slice(0,-1));setError('');}
    else if(k==='enter'){tryPin(pin);}
    else if(pin.length<4){
      const np=pin+k;setPin(np);
      if(np.length===4) tryPin(np);
    }
  }

  const keys=['1','2','3','4','5','6','7','8','9','del','0','enter'];

  return(
    <div className="login-screen">
      <div className="login-logo">
        <div className="t1">Taquería</div>
        <div className="t-sep"/>
        <div className="t2">Nueva Orden</div>
      </div>
      <div className="login-card">
        <div className="login-title">Bienvenido</div>
        <div className="login-sub">Selecciona tu rol e ingresa tu PIN</div>

        {sucursales.length>1&&(
          <div className="login-suc-select">
            <div className="field" style={{marginBottom:0}}>
              <label>Sucursal</label>
              <select value={sucId} onChange={e=>setSucId(e.target.value)}>
                {sucursales.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
            </div>
          </div>
        )}

        <div className="pin-tabs">
          {ROLES.map(r=>(
            <button key={r.key} className={`pin-tab${rol===r.key?' active':''}`} onClick={()=>{setRol(r.key);setPin('');setError('');}}>
              {r.label}
            </button>
          ))}
        </div>

        <div className="pin-display">
          {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?' filled':''}`}/>)}
        </div>

        <div className="pin-keypad">
          {keys.map(k=>(
            <button key={k} className={`pin-key ${k==='del'?'del':k==='enter'?'enter':''}`} onClick={()=>press(k)}>
              {k==='del'?'⌫':k==='enter'?'→':k}
            </button>
          ))}
        </div>

        {error&&<div className="pin-error">{error}</div>}
      </div>
      <div className="login-credit">Sistema por <b>AA Projects</b></div>
    </div>
  );
}

// ── Mesas ─────────────────────────────────────────────────────────
function MesasTab({suc,addToast,reload}){
  const {mesas,menu,inventario,transacciones}=suc;
  const [mesaSel,setMesaSel]=useState(null);
  const [separando,setSeparando]=useState(false);
  const [cuentas,setCuentas]=useState([]);
  const [cuentaActiva,setCuentaActiva]=useState(0);

  const mesa=mesaSel!=null?mesas.find(m=>m.id===mesaSel):null;

  function stockDisponible(menuId){
    const mi=menu.find(m=>m.id===menuId);
    if(!mi||!mi.invId) return 999;
    const inv=inventario.find(i=>i.id===mi.invId);
    if(!inv) return 999;
    const enUso=mesas.reduce((s,m)=>{const l=m.orden.find(l=>l.id===menuId);return s+(l?l.qty:0);},0);
    return Math.max(0,inv.stock-enUso);
  }
  function getMenuSt(menuId){
    const d=stockDisponible(menuId);
    if(d<=0) return 'sin-stock';
    const mi=menu.find(m=>m.id===menuId);
    if(!mi||!mi.invId) return 'disponible';
    const inv=inventario.find(i=>i.id===mi.invId);
    return (!inv||inv.stock<=inv.min)?'stock-bajo':'disponible';
  }

  function initCuentas(m){
    const n=Array.from({length:m.personas},(_,i)=>({id:i,label:'Persona '+(i+1),items:[],pagada:false}));
    setCuentas(n);setCuentaActiva(0);
  }
  function selMesa(id){setMesaSel(id);setSeparando(false);initCuentas(mesas.find(m=>m.id===id));}
  function volver(){setMesaSel(null);setSeparando(false);setCuentas([]);}

  async function patchMesa(id,patch){await S(suc.id,'/mesas/'+id,patch,'PUT');reload();}

  async function agregarItem(itemId){
    const d=stockDisponible(itemId);
    if(d<=0){addToast('Sin stock para este ítem','error');return;}
    const mi=menu.find(m=>m.id===itemId);
    if(d===1) addToast('⚠ Último disponible: '+mi.nombre,'warning');
    const m={...mesa,orden:mesa.orden.map(l=>({...l}))};
    const l=m.orden.find(l=>l.id===itemId);
    if(l) l.qty++;
    else m.orden=[...m.orden,{id:itemId,nombre:mi.nombre,precio:mi.precio,qty:1}];
    m.estado='ocupada';
    await patchMesa(mesaSel,{orden:m.orden,estado:m.estado});
  }
  async function quitarItem(itemId){
    const m={...mesa,orden:mesa.orden.map(l=>({...l}))};
    const l=m.orden.find(l=>l.id===itemId);
    if(l){l.qty--;if(l.qty<=0)m.orden=m.orden.filter(x=>x.id!==itemId);}
    if(!m.orden.length) m.estado='libre';
    await patchMesa(mesaSel,{orden:m.orden,estado:m.estado});
  }
  async function pedirCuenta(){
    if(!mesa.orden.length){addToast('La orden está vacía','error');return;}
    await patchMesa(mesaSel,{estado:'cuenta'});
    addToast('Mesa '+mesa.nombre+' pide la cuenta');
  }
  async function cobrarMesa(){
    if(!mesa.orden.length){addToast('No hay nada que cobrar','error');return;}
    const total=mesa.orden.reduce((s,l)=>s+l.precio*l.qty,0);
    await api.post('/api/suc/'+suc.id+'/cobrar',{mesaId:mesaSel,orden:mesa.orden,detalle:'Cuenta completa',cobradoParcial:false});
    addToast('Cobrado Q'+total+' ✓','success');reload();volver();
  }
  async function cancelarOrden(){
    await patchMesa(mesaSel,{orden:[],estado:'libre',cobrado:0});
    setCuentas([]);volver();
  }
  async function cambiarPersonas(d){
    const np=Math.max(1,Math.min(20,mesa.personas+d));
    await patchMesa(mesaSel,{personas:np});
    const n=Array.from({length:np},(_,i)=>({id:i,label:'Persona '+(i+1),items:[],pagada:false}));
    setCuentas(n);setCuentaActiva(0);
  }
  function asignarItem(lineaId){
    const linea=mesa.orden.find(l=>l.id===lineaId);if(!linea) return;
    const asig=cuentas.reduce((s,c)=>s+c.items.filter(it=>it.lineaId===lineaId).reduce((a,it)=>a+it.qty,0),0);
    if(asig>=linea.qty){addToast('Ya todos asignados','error');return;}
    setCuentas(prev=>prev.map((c,i)=>{
      if(i!==cuentaActiva) return c;
      const ex=c.items.find(it=>it.lineaId===lineaId);
      return{...c,items:ex?c.items.map(it=>it.lineaId===lineaId?{...it,qty:it.qty+1}:it):[...c.items,{lineaId,nombre:linea.nombre,precio:linea.precio,qty:1}]};
    }));
  }
  function quitarDeCuenta(idx){
    setCuentas(prev=>prev.map((c,i)=>{
      if(i!==cuentaActiva) return c;
      return{...c,items:c.items.map((it,j)=>j===idx?{...it,qty:it.qty-1}:it).filter(it=>it.qty>0)};
    }));
  }
  async function cobrarCuenta(i){
    const cuenta=cuentas[i];
    const total=cuenta.items.reduce((s,it)=>s+it.precio*it.qty,0);
    const nuevas=cuentas.map((c,j)=>j===i?{...c,pagada:true}:c);
    const todas=nuevas.every(c=>c.pagada);
    await api.post('/api/suc/'+suc.id+'/cobrar',{
      mesaId:mesaSel,
      orden:cuenta.items.map(it=>({id:it.lineaId,nombre:it.nombre,precio:it.precio,qty:it.qty})),
      detalle:cuenta.label,cobradoParcial:!todas
    });
    setCuentas(nuevas);
    addToast('Cobrado '+cuenta.label+' Q'+total+' ✓','success');
    if(todas){await patchMesa(mesaSel,{orden:[],estado:'libre',cobrado:0});addToast('Mesa liberada ✓','success');volver();}
    else{setCuentaActiva(nuevas.findIndex(c=>!c.pagada));reload();}
  }

  const libres=mesas.filter(m=>m.estado==='libre').length;
  const ocupadas=mesas.filter(m=>m.estado!=='libre').length;
  const totalVentas=transacciones.reduce((s,t)=>s+t.total,0);
  const totalPendiente=mesas.reduce((s,m)=>s+m.orden.reduce((a,l)=>a+l.precio*l.qty,0),0);

  if(!mesaSel) return(
    <div className="panel fade-up">
      <div className="stats-row">
        <div className="stat-card"><div className="stat-label">Mesas libres</div><div className="stat-value green">{libres}</div></div>
        <div className="stat-card"><div className="stat-label">Mesas ocupadas</div><div className="stat-value yellow">{ocupadas}</div></div>
        <div className="stat-card"><div className="stat-label">Ventas hoy</div><div className="stat-value">Q{totalVentas}</div></div>
        <div className="stat-card"><div className="stat-label">Por cobrar</div><div className="stat-value red">{totalPendiente>0?'Q'+totalPendiente:'—'}</div><div className="stat-sub">en mesas activas</div></div>
      </div>
      <div className="mesas-grid">
        {mesas.map(m=>{
          const ord=m.orden.reduce((s,l)=>s+l.precio*l.qty,0);
          const pend=ord-(m.cobrado||0);
          return(
            <div key={m.id} className={`mesa-card ${m.estado}`} onClick={()=>selMesa(m.id)}>
              <div className="mesa-strip"/><div className="mesa-dot"/>
              <div className="mesa-num">{m.id}</div>
              <div className="mesa-nombre">{m.nombre}</div>
              <div className="mesa-lbl">{m.estado==='libre'?'Libre':m.estado==='cuenta'?'Pide cuenta':'Ocupada'}</div>
              {m.estado!=='libre'&&<div className="mesa-pendiente"><div className="mesa-pendiente-lbl">Por cobrar</div><div className="mesa-pendiente-val">Q{pend}</div></div>}
              {m.cobrado>0&&<div className="mesa-cobrado">✓ Q{m.cobrado} cobrado</div>}
            </div>
          );
        })}
      </div>
    </div>
  );

  const totalOrden=mesa.orden.reduce((s,l)=>s+l.precio*l.qty,0);
  const cobradoMesa=mesa.cobrado||0;
  const pendienteMesa=totalOrden-cobradoMesa;
  const asignados={};
  cuentas.forEach(c=>c.items.forEach(it=>{asignados[it.lineaId]=(asignados[it.lineaId]||0)+it.qty;}));
  const sinAsignar=mesa.orden.map(l=>{const a=asignados[l.id]||0;const r=l.qty-a;return r>0?{...l,disponible:r}:null;}).filter(Boolean);
  const cuentaAct=cuentas[cuentaActiva];

  return(
    <div className="panel fade-up">
      <div className="orden-hdr">
        <button className="back-btn" onClick={volver}>← Mesas</button>
        <div className="orden-title">{mesa.nombre}</div>
        <span className={`badge badge-${mesa.estado}`}>{mesa.estado==='libre'?'Libre':mesa.estado==='cuenta'?'Pide cuenta':'Ocupada'}</span>
      </div>
      <div className="orden-layout">
        <div className="orden-menu-col">
          <div className="sec-hdr">Menú</div>
          <div className="menu-grid">
            {menu.map(item=>{
              const st=getMenuSt(item.id);
              const disp=stockDisponible(item.id);
              const inv=item.invId?inventario.find(i=>i.id===item.invId):null;
              return(
                <div key={item.id} className={`menu-card ${st}`} onClick={st!=='sin-stock'?()=>agregarItem(item.id):undefined}>
                  <div className="mc-info">
                    <div className="mc-name">{item.emoji} {item.nombre}</div>
                    <div className="mc-price">Q{item.precio}</div>
                    {inv&&<div className={`mc-stock ${st==='sin-stock'?'agotado':st==='stock-bajo'?'bajo':'ok'}`}>{st==='sin-stock'?'Agotado':disp+' disp.'}</div>}
                  </div>
                  <button className="mc-add" disabled={st==='sin-stock'} onClick={e=>{e.stopPropagation();if(st!=='sin-stock')agregarItem(item.id);}}>+</button>
                </div>
              );
            })}
          </div>
        </div>

        <div className="sidebar">
          <div className="sidebar-hdr">
            <div className="sidebar-hdr-title">Orden — {mesa.nombre}</div>
            <button className="btn-pide" onClick={pedirCuenta}>Pedir cuenta</button>
          </div>
          <div className="personas-row">
            <span className="personas-lbl">Personas</span>
            <div className="personas-ctrl">
              <button className="p-btn" onClick={()=>cambiarPersonas(-1)}>−</button>
              <span className="p-num">{mesa.personas}</span>
              <button className="p-btn" onClick={()=>cambiarPersonas(1)}>+</button>
            </div>
          </div>
          <div className="sep-row">
            <button className={`sep-btn${separando?' on':''}`} onClick={()=>setSeparando(s=>!s)}>
              {separando?'↩ Ver orden completa':'Separar cuentas por persona'}
            </button>
          </div>

          {!separando?(
            <>
              <div className="order-lines">
                {!mesa.orden.length?<div className="empty-msg">Sin ítems aún</div>
                  :mesa.orden.map(l=>(
                    <div key={l.id} className="order-line">
                      <div className="ol-name">{l.nombre}</div>
                      <div className="ol-ctrl">
                        <button className="ol-btn" onClick={()=>quitarItem(l.id)}>−</button>
                        <span className="ol-qty">{l.qty}</span>
                        <button className="ol-btn" onClick={()=>agregarItem(l.id)}>+</button>
                      </div>
                      <div className="ol-price">Q{l.precio*l.qty}</div>
                    </div>
                  ))
                }
              </div>
              <div className="sidebar-footer">
                {totalOrden>0&&(
                  <div className="footer-desglose">
                    <div className="footer-row"><span className="lbl">Total orden</span><span className="val total-fx">Q{totalOrden}</span></div>
                    {cobradoMesa>0&&<><hr className="footer-divider"/><div className="footer-row"><span className="lbl">✓ Cobrado</span><span className="val cobrado">Q{cobradoMesa}</span></div></>}
                    <hr className="footer-divider"/>
                    <div className="footer-row"><span className="lbl">Por cobrar</span><span className="val pendiente">Q{pendienteMesa}</span></div>
                  </div>
                )}
                <button className="btn btn-primary btn-full" onClick={cobrarMesa}>Cobrar todo — Q{totalOrden}</button>
                <button className="btn btn-ghost btn-full" style={{marginTop:6}} onClick={cancelarOrden}>Cancelar orden</button>
              </div>
            </>
          ):(
            <div className="csep">
              <div className="ctabs">
                {cuentas.map((c,i)=>{const ct=c.items.reduce((s,it)=>s+it.precio*it.qty,0);return<button key={i} className={`ctab${c.pagada?' pagada':i===cuentaActiva?' active':''}`} onClick={()=>setCuentaActiva(i)}>{c.label}{ct>0?' Q'+ct:''}</button>;})}
              </div>
              <div className="sin-asignar">
                <div className="sa-lbl">Sin asignar</div>
                {!sinAsignar.length?<div className="todo-ok">✓ Todos asignados</div>
                  :sinAsignar.map(l=><div key={l.id} className="sa-item"><span className="sa-name">{l.nombre}</span><span className="sa-disp">×{l.disponible}</span><button className="btn-asignar" onClick={()=>asignarItem(l.id)}>Asignar</button></div>)
                }
              </div>
              {cuentaAct&&!cuentaAct.pagada?(
                <>
                  <div className="cuenta-lines">
                    {!cuentaAct.items.length?<div className="empty-msg">Sin ítems en {cuentaAct.label}</div>
                      :cuentaAct.items.map((it,idx)=><div key={idx} className="order-line"><div className="ol-name">{it.nombre}</div><div className="ol-ctrl"><button className="ol-btn" onClick={()=>quitarDeCuenta(idx)}>−</button><span className="ol-qty">{it.qty}</span></div><div className="ol-price">Q{it.precio*it.qty}</div></div>)
                    }
                  </div>
                  <div className="csep-footer">
                    <div className="ctotal-row"><span className="ctotal-lbl">{cuentaAct.label}</span><span className="ctotal-val">Q{cuentaAct.items.reduce((s,it)=>s+it.precio*it.qty,0)}</span></div>
                    <button className="btn-cobrar-cuenta" disabled={!cuentaAct.items.length} onClick={()=>cobrarCuenta(cuentaActiva)}>Cobrar Q{cuentaAct.items.reduce((s,it)=>s+it.precio*it.qty,0)}</button>
                  </div>
                </>
              ):<div className="cuenta-lines"><div className="empty-msg" style={{color:'var(--green)'}}>✓ Cobrada</div></div>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Mostrador (toma express / tablet) ─────────────────────────────
function MostradorTab({suc,addToast,reload}){
  const {menu,inventario,transacciones}=suc;
  const [orden,setOrden]=useState([]);

  const ticketsHoy=useMemo(()=>transacciones.filter(t=>t.mostrador),[transacciones]);
  const nextTicket=ticketsHoy.length+1;

  function stockDisponible(menuId){
    const mi=menu.find(m=>m.id===menuId);
    if(!mi||!mi.invId) return 999;
    const inv=inventario.find(i=>i.id===mi.invId);
    if(!inv) return 999;
    const enCarrito=orden.find(l=>l.id===menuId);
    return Math.max(0,inv.stock-(enCarrito?enCarrito.qty:0));
  }
  function getEst(menuId){
    const d=stockDisponible(menuId);
    if(d<=0) return 'sin-stock';
    const mi=menu.find(m=>m.id===menuId);
    if(!mi||!mi.invId) return 'ok';
    const inv=inventario.find(i=>i.id===mi.invId);
    return (!inv||inv.stock<=inv.min)?'bajo':'ok';
  }

  function agregar(itemId){
    const d=stockDisponible(itemId);
    if(d<=0){addToast('Sin stock','error');return;}
    const mi=menu.find(m=>m.id===itemId);
    setOrden(prev=>{
      const l=prev.find(x=>x.id===itemId);
      if(l) return prev.map(x=>x.id===itemId?{...x,qty:x.qty+1}:x);
      return [...prev,{id:itemId,nombre:mi.nombre,precio:mi.precio,qty:1}];
    });
  }
  function quitar(itemId){
    setOrden(prev=>prev.map(x=>x.id===itemId?{...x,qty:x.qty-1}:x).filter(x=>x.qty>0));
  }
  function limpiar(){
    if(!orden.length) return;
    if(!confirm('¿Cancelar ticket actual?')) return;
    setOrden([]);
  }
  async function cobrar(){
    if(!orden.length){addToast('Ticket vacío','error');return;}
    const total=orden.reduce((s,l)=>s+l.precio*l.qty,0);
    await api.post('/api/suc/'+suc.id+'/cobrar',{
      mesaId:0,orden,detalle:'Ticket #'+nextTicket,
      cobradoParcial:false,mostrador:true
    });
    addToast('Ticket #'+nextTicket+' — Q'+total+' ✓','success');
    setOrden([]);reload();
  }

  const total=orden.reduce((s,l)=>s+l.precio*l.qty,0);
