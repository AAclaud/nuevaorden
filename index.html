const DONUT_COLORS=['#365322','#a07600','#a44a2a','#5d7a3f','#7a5c3a','#4a6b30','#8a7a3f'];
function DonutChart({data}){
  if(!data||!data.length) return <div className="empty-msg">Sin datos aún</div>;
  const total=data.reduce((s,d)=>s+d.v,0);
  if(total===0) return <div className="empty-msg">Sin datos aún</div>;
  const r=44,cx=60,cy=60,strokeW=14;
  if(data.length===1){
    return(
      <div className="donut-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={DONUT_COLORS[0]} strokeWidth={strokeW}/>
          <text x="60" y="56" textAnchor="middle" fontSize="10" fill="var(--text3)" fontFamily="Jost,sans-serif">Total</text>
          <text x="60" y="72" textAnchor="middle" fontSize="13" fill="var(--brand-green)" fontFamily="Jost,sans-serif" fontWeight="700">Q{total}</text>
        </svg>
        <div className="donut-legend">
          <div className="donut-legend-item"><div className="donut-legend-dot" style={{background:DONUT_COLORS[0]}}/>{data[0].k} 100%</div>
        </div>
      </div>
    );
  }
  let angle=-90;
  const segments=data.map((d,i)=>{
    const pct=d.v/total;
    const sweep=pct*359.99;
    const a1=angle*Math.PI/180;
    const a2=(angle+sweep)*Math.PI/180;
    const x1=cx+r*Math.cos(a1);const y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2);const y2=cy+r*Math.sin(a2);
    const lg=sweep>180?1:0;
    const pathD=`M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${lg} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
    angle+=sweep;
    return{pathD,color:DONUT_COLORS[i%DONUT_COLORS.length],label:d.k,pct:Math.round(pct*100)};
  });
  return(
    <div className="donut-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        {segments.map((s,i)=>(
          <path key={i} d={s.pathD} fill="none" stroke={s.color} strokeWidth={strokeW} strokeLinecap="butt"/>
        ))}
        <text x="60" y="56" textAnchor="middle" fontSize="10" fill="var(--text3)" fontFamily="Jost,sans-serif">Total</text>
        <text x="60" y="72" textAnchor="middle" fontSize="13" fill="var(--brand-green)" fontFamily="Jost,sans-serif" fontWeight="700">Q{total}</text>
      </svg>
      <div className="donut-legend">
        {segments.slice(0,5).map((s,i)=>(
          <div key={i} className="donut-legend-item">
            <div className="donut-legend-dot" style={{background:s.color}}/>
            {s.label} {s.pct}%
          </div>
        ))}
      </div>
    </div>
  );
}

// Helpers de rango
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x.getTime();}
function endOfDay(d){const x=new Date(d);x.setHours(23,59,59,999);return x.getTime();}
function parseFechaGT(fecha){
  // fecha formato "d/m/yyyy" es-GT
  if(!fecha) return null;
  const parts=fecha.split('/');
  if(parts.length!==3) return null;
  const [d,m,y]=parts.map(n=>parseInt(n));
  if(!d||!m||!y) return null;
  return new Date(y,m-1,d).getTime();
}
function txTimestamp(t){
  if(t.ts) return t.ts;
  const base=parseFechaGT(t.fecha);
  if(!base) return null;
  if(t.hora){
    const [hh,mm]=t.hora.split(':').map(n=>parseInt(n)||0);
    return base + hh*3600000 + mm*60000;
  }
  return base;
}
function fmtRangeLabel(start,end){
  const f=(ts)=>new Date(ts).toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'numeric'});
  if(startOfDay(start)===startOfDay(end)) return f(start);
  return f(start)+' – '+f(end);
}

function ReportesTab({suc}){
  const {transacciones,mesas}=suc;
  const [rango,setRango]=useState('diario'); // diario|semanal|mensual

  // Calcular ventana de tiempo
  const {start,end,label}=useMemo(()=>{
    const now=new Date();
    if(rango==='diario'){
      return {start:startOfDay(now),end:endOfDay(now),label:'Hoy'};
    }
    if(rango==='semanal'){
      const d=new Date(now);
      const day=d.getDay(); // 0=dom
      const diff=(day===0?6:day-1); // inicio lunes
      d.setDate(d.getDate()-diff);
      return {start:startOfDay(d),end:endOfDay(now),label:'Semana'};
    }
    // mensual
    const first=new Date(now.getFullYear(),now.getMonth(),1);
    return {start:startOfDay(first),end:endOfDay(now),label:'Mes'};
  },[rango]);

  // Filtrar transacciones por rango
  const txFiltradas=useMemo(()=>{
    return transacciones.filter(t=>{
      const ts=txTimestamp(t);
      if(ts===null) return rango==='diario'; // sin ts, asumir de hoy (datos viejos)
      return ts>=start && ts<=end;
    });
  },[transacciones,start,end,rango]);

  // Ventas agregadas (solo del rango)
  const ventasRango=useMemo(()=>{
    const v={};
    txFiltradas.forEach(t=>{
      (t.orden||[]).forEach(l=>{ v[l.nombre]=(v[l.nombre]||0)+l.qty; });
    });
    return v;
  },[txFiltradas]);

  const total=txFiltradas.reduce((s,t)=>s+t.total,0);
  const totalPend=mesas.reduce((s,m)=>s+m.orden.reduce((a,l)=>a+l.precio*l.qty,0),0);
  const keys=Object.keys(ventasRango);
  const topNom=keys.length?keys.sort((a,b)=>ventasRango[b]-ventasRango[a])[0]:'—';
  const topQty=keys.length?ventasRango[topNom]:0;
  const maxQty=Math.max(...Object.values(ventasRango),1);
  const prom=txFiltradas.length?Math.round(total/txFiltradas.length):0;
  const ticketsMostrador=txFiltradas.filter(t=>t.mostrador).length;
  const ventasMesas=txFiltradas.length-ticketsMostrador;

  // Serie temporal (hora para diario, día para semanal/mensual)
  const serie=useMemo(()=>{
    if(rango==='diario'){
      const h=Array(12).fill(0); // 9am-9pm
      txFiltradas.forEach(t=>{
        if(!t.hora) return;
        const hr=parseInt(t.hora.split(':')[0]);
        const idx=Math.max(0,Math.min(11,hr-9));
        h[idx]+=t.total;
      });
      return h.map((v,i)=>({lbl:(9+i)+'h',val:v}));
    }
    // Agrupar por día
    const dias=[];
    const d=new Date(start);
    while(d.getTime()<=end){
      dias.push({
        key:startOfDay(d),
        lbl:d.toLocaleDateString('es-GT',{day:'2-digit',month:'2-digit'}),
        val:0
      });
      d.setDate(d.getDate()+1);
    }
    txFiltradas.forEach(t=>{
      const ts=txTimestamp(t); if(ts===null) return;
      const dayKey=startOfDay(ts);
      const bucket=dias.find(x=>x.key===dayKey);
      if(bucket) bucket.val+=t.total;
    });
    return dias;
  },[txFiltradas,rango,start,end]);
  const maxH=Math.max(...serie.map(x=>x.val),1);

  const donutData=keys.slice(0,6).sort((a,b)=>ventasRango[b]-ventasRango[a]).map(k=>({k,v:ventasRango[k]}));
  const ventaData=Object.entries(ventasRango).sort((a,b)=>b[1]-a[1]).slice(0,10);

  function exportPDF(){
    try{
      const {jsPDF}=window.jspdf||{};
      if(!jsPDF){alert('No se pudo cargar el generador de PDF');return;}
      const doc=new jsPDF({unit:'pt',format:'letter'});
      const W=doc.internal.pageSize.getWidth();
      const marg=40;
      const GREEN=[54,83,34], CREAM=[253,248,208], DARK=[36,55,24], TEXT=[42,53,24], MUTED=[138,145,117];

      // Cabecera
      doc.setFillColor(...GREEN);
      doc.rect(0,0,W,80,'F');
      doc.setTextColor(...CREAM);
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.text('TAQUERÍA',marg,32);
      doc.setFont('helvetica','bold');
      doc.setFontSize(20);
      doc.text('NUEVA ORDEN',marg,56);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.text('Informe de ventas',W-marg,32,{align:'right'});
      doc.setFontSize(11);
      doc.setFont('helvetica','bold');
      doc.text(label.toUpperCase(),W-marg,52,{align:'right'});
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      doc.text(fmtRangeLabel(start,end),W-marg,68,{align:'right'});

      // Metadata
      let y=110;
      doc.setTextColor(...MUTED);
      doc.setFontSize(9);
      doc.text('Sucursal: '+suc.nombre,marg,y);
      doc.text('Generado: '+new Date().toLocaleString('es-GT'),W-marg,y,{align:'right'});
      y+=20;

      // KPIs
      const kpis=[
        ['Total ventas','Q'+total.toLocaleString()],
        ['N° transacciones',String(txFiltradas.length)],
        ['Venta promedio',prom?'Q'+prom:'—'],
        ['Top producto',topNom+(topQty?' ('+topQty+')':'')],
      ];
      const kpiW=(W-marg*2-24)/4;
      kpis.forEach((k,i)=>{
        const x=marg+i*(kpiW+8);
        doc.setFillColor(247,243,227);
        doc.roundedRect(x,y,kpiW,52,6,6,'F');
        doc.setTextColor(...MUTED);
        doc.setFontSize(7);
        doc.text(k[0].toUpperCase(),x+10,y+16);
        doc.setTextColor(...DARK);
        doc.setFont('helvetica','bold');
        doc.setFontSize(13);
        doc.text(k[1],x+10,y+38);
        doc.setFont('helvetica','normal');
      });
      y+=70;

      // Desglose
      doc.setTextColor(...DARK);
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.text('Desglose operativo',marg,y); y+=4;
      doc.setDrawColor(225,216,184);
      doc.line(marg,y,W-marg,y); y+=14;
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.setTextColor(...TEXT);
      doc.text('Ventas en mesas: '+ventasMesas,marg,y);
      doc.text('Tickets mostrador: '+ticketsMostrador,marg+200,y);
      doc.text('Por cobrar (activo): Q'+totalPend,marg+380,y);
      y+=24;

      // Gráfico: serie temporal (barras simples)
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.text(rango==='diario'?'Ventas por hora':'Ventas por día',marg,y);
      y+=10;
      const chartH=100, chartW=W-marg*2, baseY=y+chartH;
      doc.setDrawColor(225,216,184);
      doc.line(marg,baseY,W-marg,baseY);
      const barW=Math.max(6,(chartW-serie.length*4)/serie.length);
      serie.forEach((s,i)=>{
        const h=s.val>0?Math.max(2,(s.val/maxH)*chartH):0;
        const x=marg+i*(barW+4);
        doc.setFillColor(...GREEN);
        doc.rect(x,baseY-h,barW,h,'F');
        doc.setTextColor(...MUTED);
        doc.setFontSize(6.5);
        if(serie.length<=14||i%Math.ceil(serie.length/14)===0){
          doc.text(s.lbl,x+barW/2,baseY+10,{align:'center'});
        }
      });
      y=baseY+26;

      // Tabla: ventas por producto
      if(ventaData.length){
        if(y>700){doc.addPage();y=60;}
        doc.autoTable({
          startY:y,
          head:[['Producto','Unidades','Participación']],
          body:ventaData.map(([n,q])=>[n,q,Math.round(q/maxQty*100)+'%']),
          margin:{left:marg,right:marg},
          styles:{font:'helvetica',fontSize:9,textColor:TEXT,cellPadding:6},
          headStyles:{fillColor:GREEN,textColor:CREAM,fontStyle:'bold',fontSize:9},
          alternateRowStyles:{fillColor:[247,243,227]},
        });
        y=doc.lastAutoTable.finalY+18;
      }

      // Tabla: transacciones
      if(txFiltradas.length){
        if(y>650){doc.addPage();y=60;}
        doc.setFont('helvetica','bold');
        doc.setFontSize(11);
        doc.setTextColor(...DARK);
        doc.text('Detalle de transacciones ('+txFiltradas.length+')',marg,y);
        y+=6;
        doc.autoTable({
          startY:y+6,
          head:[['Fecha','Hora','Punto','Detalle','Total']],
          body:txFiltradas.slice().reverse().map(t=>[
            t.fecha||'',t.hora||'',t.mesaNombre||'',t.detalle||'','Q'+t.total
          ]),
          margin:{left:marg,right:marg},
          styles:{font:'helvetica',fontSize:8,textColor:TEXT,cellPadding:5},
          headStyles:{fillColor:GREEN,textColor:CREAM,fontStyle:'bold',fontSize:8},
          alternateRowStyles:{fillColor:[247,243,227]},
          columnStyles:{4:{halign:'right',fontStyle:'bold'}},
        });
      }

      // Pie de página
      const pages=doc.internal.getNumberOfPages();
      for(let p=1;p<=pages;p++){
        doc.setPage(p);
        doc.setFontSize(8);
        doc.setTextColor(...MUTED);
        doc.text('Sistema por AA Projects — Taquería Nueva Orden',marg,doc.internal.pageSize.getHeight()-20);
        doc.text('Página '+p+' de '+pages,W-marg,doc.internal.pageSize.getHeight()-20,{align:'right'});
      }

      const fname='informe-'+rango+'-'+new Date().toISOString().slice(0,10)+'.pdf';
      doc.save(fname);
    }catch(e){
      console.error(e);
      alert('Error generando PDF: '+e.message);
    }
  }

  return(
    <div className="panel fade-up">
      {/* Selector de rango + botón PDF */}
      <div className="rep-range-bar">
        <span className="rep-range-lbl">Rango</span>
        <div className="rep-range-tabs">
          <button className={`rep-range-tab${rango==='diario'?' active':''}`} onClick={()=>setRango('diario')}>Diario</button>
          <button className={`rep-range-tab${rango==='semanal'?' active':''}`} onClick={()=>setRango('semanal')}>Semanal</button>
          <button className={`rep-range-tab${rango==='mensual'?' active':''}`} onClick={()=>setRango('mensual')}>Mensual</button>
        </div>
        <div className="rep-range-info">
          <span className="rep-range-dates">{fmtRangeLabel(start,end)}</span>
          <button className="rep-pdf-btn" onClick={exportPDF}>📄 Descargar PDF</button>
        </div>
      </div>

      <div className="kpi-row">
        <div className="kpi-card"><div className="kpi-val">Q{total}</div><div className="kpi-lbl">Total {label.toLowerCase()}</div></div>
        <div className="kpi-card"><div className="kpi-val">{txFiltradas.length}</div><div className="kpi-lbl">Ventas</div></div>
        <div className="kpi-card"><div className="kpi-val" style={{color:'var(--amber)'}}>{prom?'Q'+prom:'—'}</div><div className="kpi-lbl">Venta prom.</div></div>
      </div>

      {(ticketsMostrador>0||ventasMesas>0)&&(
        <div className="kpi-row" style={{gridTemplateColumns:'1fr 1fr'}}>
          <div className="kpi-card"><div className="kpi-val" style={{color:'var(--brand-green)'}}>{ventasMesas}</div><div className="kpi-lbl">Ventas en mesas</div></div>
          <div className="kpi-card"><div className="kpi-val" style={{color:'var(--brand-green-lt)'}}>{ticketsMostrador}</div><div className="kpi-lbl">Tickets mostrador</div></div>
        </div>
      )}

      {totalPend>0&&<div className="inv-alert warning" style={{marginBottom:12}}><span>💰</span><div><b>Por cobrar aún</b>Q{totalPend} en mesas activas</div></div>}

      <div className="rep-charts">
        <div className="rep-chart-card">
          <div className="rep-chart-title">{rango==='diario'?'Ventas por hora':'Ventas por día'}</div>
          <div className="hourly-chart">
            {serie.map((s,i)=>(
              <div key={i} className="hourly-bar-wrap">
                <div className="hourly-bar" style={{height:s.val>0?Math.max(8,Math.round(s.val/maxH*70))+'px':'4px',opacity:s.val>0?1:.3}}/>
                <div className="hourly-bar-lbl">{s.lbl}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="rep-chart-card">
          <div className="rep-chart-title">Mix de productos</div>
          <DonutChart data={donutData}/>
        </div>
      </div>

      <div className="sec-hdr">Ventas por producto</div>
      {!keys.length?<div className="empty-msg" style={{textAlign:'left'}}>Sin ventas en este rango</div>
        :(
          <div className="rep-chart-card">
            <div className="bar-chart">
              {ventaData.map(([n,q])=>(
                <div key={n} className="bar-row">
                  <div className="bar-label">{n}</div>
                  <div className="bar-track"><div className="bar-fill" style={{width:Math.round(q/maxQty*100)+'%'}}/></div>
                  <div className="bar-val">{q} uds.</div>
                </div>
              ))}
            </div>
          </div>
        )
      }

      <div className="sec-hdr" style={{marginTop:16}}>Top producto</div>
      <div className="card" style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontSize:36}}>🏆</div>
        <div>
          <div style={{fontFamily:'Jost,sans-serif',fontSize:18,fontWeight:700,color:'var(--brand-green)',letterSpacing:'.3px'}}>{topNom}</div>
          {topQty>0&&<div style={{fontSize:13,color:'var(--text3)',marginTop:2}}>{topQty} unidades vendidas en {label.toLowerCase()}</div>}
        </div>
      </div>
    </div>
  );
}

// ── Admin ─────────────────────────────────────────────────────────
function AdminTab({suc,allData,addToast,reloadAll,reloadSuc}){
  const [showMesaForm,setShowMesaForm]=useState(false);
  const [newMesaNombre,setNewMesaNombre]=useState('');
  const [showSucForm,setShowSucForm]=useState(false);
  const [newSuc,setNewSuc]=useState({nombre:'',ciudad:''});
  const [showPinForm,setShowPinForm]=useState(false);
  const [pins,setPins]=useState({admin:'',cajero:''});
  const [editMesaId,setEditMesaId]=useState(null);
  const [editMesaNombre,setEditMesaNombre]=useState('');

  async function addMesa(){
    if(!newMesaNombre.trim()){addToast('Escribe un nombre','error');return;}
    await S(suc.id,'/mesas',{nombre:newMesaNombre.trim()},'POST');
    setNewMesaNombre('');setShowMesaForm(false);reloadSuc();addToast('Mesa agregada ✓','success');
  }
  async function delMesa(id){
    const m=suc.mesas.find(m=>m.id===id);
    if(m&&m.estado!=='libre'){addToast('Libera la mesa antes de eliminarla','error');return;}
    if(!confirm('¿Eliminar esta mesa?')) return;
    await S(suc.id,'/mesas/'+id,null,'DELETE');reloadSuc();addToast('Mesa eliminada');
  }
  async function saveMesaNombre(id){
    if(!editMesaNombre.trim()) return;
    await S(suc.id,'/mesas/'+id,{nombre:editMesaNombre.trim()},'PUT');
    setEditMesaId(null);reloadSuc();addToast('Nombre actualizado');
  }
  async function addSuc(){
    if(!newSuc.nombre.trim()){addToast('Nombre requerido','error');return;}
    await api.post('/api/sucursales',newSuc);
    setNewSuc({nombre:'',ciudad:''});setShowSucForm(false);reloadAll();addToast('Sucursal creada ✓','success');
  }
  async function delSuc(id){
    if(!confirm('¿Eliminar esta sucursal? Se perderán todos sus datos.')) return;
    await api.del('/api/sucursales/'+id);reloadAll();addToast('Sucursal eliminada');
  }
  async function savePins(){
    if((pins.admin&&pins.admin.length!==4)||(pins.cajero&&pins.cajero.length!==4)){addToast('El PIN debe ser de 4 dígitos','error');return;}
    await api.put('/api/pins',{admin:pins.admin||undefined,cajero:pins.cajero||undefined});
    setPins({admin:'',cajero:''});setShowPinForm(false);addToast('PINs actualizados ✓','success');
  }

  return(
    <div className="panel fade-up">
      <div className="admin-grid">
        {/* Mesas */}
        <div className="admin-section-card">
          <div className="admin-section-title">🪑 Mesas — {suc.nombre}</div>
          {suc.mesas.map(m=>(
            <div key={m.id} className="admin-list-item">
              {editMesaId===m.id?(
                <div style={{flex:1,display:'flex',gap:6}}>
                  <input style={{flex:1,padding:'4px 8px',borderRadius:6,border:'1px solid var(--border)',fontSize:13}} value={editMesaNombre} onChange={e=>setEditMesaNombre(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveMesaNombre(m.id)} autoFocus/>
                  <button className="btn btn-primary btn-sm" onClick={()=>saveMesaNombre(m.id)}>✓</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEditMesaId(null)}>✕</button>
                </div>
              ):(
                <>
                  <div className="admin-item-info">
                    <div className="admin-item-name">{m.nombre}</div>
                    <div className="admin-item-sub"><span className={`inv-badge ${m.estado==='libre'?'ok':m.estado==='cuenta'?'out':'low'}`}>{m.estado}</span></div>
                  </div>
                  <div className="admin-item-actions">
                    <button className="btn btn-ghost btn-sm" onClick={()=>{setEditMesaId(m.id);setEditMesaNombre(m.nombre);}}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>delMesa(m.id)}>×</button>
                  </div>
                </>
              )}
            </div>
          ))}
          {!showMesaForm
            ?<button className="btn btn-ghost btn-full btn-sm" style={{marginTop:10}} onClick={()=>setShowMesaForm(true)}>+ Agregar mesa</button>
            :(
              <div style={{marginTop:10,display:'flex',gap:6}}>
                <input style={{flex:1,padding:'7px 10px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:13}} placeholder="Nombre de la mesa" value={newMesaNombre} onChange={e=>setNewMesaNombre(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addMesa()} autoFocus/>
                <button className="btn btn-primary btn-sm" onClick={addMesa}>✓</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowMesaForm(false)}>✕</button>
              </div>
            )
          }
        </div>

        {/* Sucursales */}
        <div className="admin-section-card">
          <div className="admin-section-title">🏠 Sucursales</div>
          {allData&&allData.sucursales.map(s=>(
            <div key={s.id} className="suc-card">
              <div className="suc-info">
                <div className="suc-name">{s.nombre}</div>
                <div className="suc-ciudad">{s.ciudad||'Sin ciudad'}</div>
              </div>
              <div className="suc-actions">
                {allData.sucursales.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>delSuc(s.id)}>Eliminar</button>}
              </div>
            </div>
          ))}
          {!showSucForm
            ?<button className="btn btn-ghost btn-full btn-sm" style={{marginTop:10}} onClick={()=>setShowSucForm(true)}>+ Nueva sucursal</button>
            :(
              <div className="add-form-wrap" style={{marginTop:10}}>
                <div className="field"><label>Nombre</label><input placeholder="Ej: Taquería Nueva Orden Zona 10" value={newSuc.nombre} onChange={e=>setNewSuc(p=>({...p,nombre:e.target.value}))} autoFocus/></div>
                <div className="field"><label>Ciudad / Zona</label><input placeholder="Ej: Guatemala, Zona 10" value={newSuc.ciudad} onChange={e=>setNewSuc(p=>({...p,ciudad:e.target.value}))}/></div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary btn-sm" onClick={addSuc}>Crear</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setShowSucForm(false)}>Cancelar</button>
                </div>
              </div>
            )
          }
        </div>

        {/* PINs */}
        <div className="admin-section-card">
          <div className="admin-section-title">🔒 Seguridad — PINs</div>
          <div className="admin-list-item"><div className="admin-item-info"><div className="admin-item-name">PIN Admin</div><div className="admin-item-sub">Acceso completo</div></div><div>••••</div></div>
          <div className="admin-list-item"><div className="admin-item-info"><div className="admin-item-name">PIN Cajero</div><div className="admin-item-sub">Mesas, caja, inventario, mostrador</div></div><div>••••</div></div>
          {!showPinForm
            ?<button className="btn btn-ghost btn-full btn-sm" style={{marginTop:10}} onClick={()=>setShowPinForm(true)}>Cambiar PINs</button>
            :(
              <div className="pin-reset-form">
                <div className="field"><label>Nuevo PIN Admin (4 dígitos)</label><input type="password" inputMode="numeric" maxLength={4} placeholder="••••" value={pins.admin} onChange={e=>setPins(p=>({...p,admin:e.target.value.replace(/\D/,'').slice(0,4)}))}/></div>
                <div className="field"><label>Nuevo PIN Cajero (4 dígitos)</label><input type="password" inputMode="numeric" maxLength={4} placeholder="••••" value={pins.cajero} onChange={e=>setPins(p=>({...p,cajero:e.target.value.replace(/\D/,'').slice(0,4)}))}/></div>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-primary btn-sm" onClick={savePins}>Guardar</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setShowPinForm(false)}>Cancelar</button>
                </div>
              </div>
            )
          }
        </div>

        {/* Info sistema */}
        <div className="admin-section-card">
          <div className="admin-section-title">ℹ️ Sistema</div>
          <div className="admin-list-item"><div className="admin-item-info"><div className="admin-item-name">Producto</div></div><div style={{fontSize:13,color:'var(--text3)'}}>Taquería Nueva Orden · POS</div></div>
          <div className="admin-list-item"><div className="admin-item-info"><div className="admin-item-name">Datos</div></div><div style={{fontSize:12,color:'var(--text3)'}}>data.json</div></div>
          <div className="admin-list-item"><div className="admin-item-info"><div className="admin-item-name">Sucursal activa</div></div><div style={{fontSize:13,color:'var(--brand-green)',fontWeight:600}}>{suc.nombre}</div></div>
          <div style={{marginTop:12}}>
            <div className="credit-card">
              <div className="credit-lbl">Desarrollado por</div>
              <div className="credit-name">AA PROJECTS</div>
              <div className="credit-sub">Sistema de toma de pedidos</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────
const CAJERO_TABS=['mesas','mostrador','caja','inventario'];
const ADMIN_TABS=['mesas','mostrador','caja','inventario','menu','reportes','admin'];
const TAB_LABELS={mesas:'Mesas',mostrador:'Mostrador',caja:'Caja',inventario:'Inventario',menu:'Menú',reportes:'Reportes',admin:'Admin'};
const TAB_ICONS={mesas:'🪑',mostrador:'📱',caja:'💰',inventario:'📦',menu:'🌮',reportes:'📊',admin:'⚙️'};

function App(){
  const [session,setSession]=useState(null);
  const [suc,setSuc]=useState(null);
  const [allData,setAllData]=useState(null);
  const [sucList,setSucList]=useState([]);
  const [tab,setTab]=useState('mesas');
  const [syncStatus,setSyncStatus]=useState('loading');
  const [toast,setToast]=useState(null);
  const esRef=useRef(null);
  const sessionRef=useRef(null); // siempre actualizado, sin stale closure

  function addToast(msg,type=''){setToast({msg,type,key:Date.now()});}

  // Cargar lista de sucursales antes del login
  useEffect(()=>{
    api.get('/api/sucursales')
      .then(data=>{ if(Array.isArray(data)) setSucList(data); })
      .catch(()=>setSucList([{id:1,nombre:'Taquería Nueva Orden Central'}]));
  },[]);

  // Siempre tener ref actualizada
  useEffect(()=>{ sessionRef.current=session; },[session]);

  function fetchSuc(sucId){
    setSyncStatus('loading');
    api.get('/api/data?suc='+sucId)
      .then(d=>{
        if(!d || d.error || !Array.isArray(d.mesas)){
          setSyncStatus('err');
          addToast(d?.error||'Sucursal no disponible — vuelve a iniciar sesión','error');
          return;
        }
        setSuc(d); setSyncStatus('ok');
      })
      .catch(()=>{ setSyncStatus('err'); addToast('Error al cargar datos','error'); });
  }

  function reloadSuc(){
    if(sessionRef.current) fetchSuc(sessionRef.current.sucId);
  }
  function reloadAll(){
    api.get('/api/data')
      .then(d=>{ setAllData(d); setSucList(d.sucursales||[]); })
      .catch(()=>{});
  }

  useEffect(()=>{
    if(!session) return;
    const {sucId, rol}=session;

    // Carga inicial directa
    fetchSuc(sucId);
    if(rol==='admin') reloadAll();

    // SSE para actualizaciones en tiempo real
    if(esRef.current){ esRef.current.close(); esRef.current=null; }
    try{
      const es=new EventSource('/events?suc='+sucId);
      esRef.current=es;
      es.addEventListener('init',  e=>{ try{ setSuc(JSON.parse(e.data)); setSyncStatus('ok'); }catch(_){} });
      es.addEventListener('update', e=>{ try{ setSuc(JSON.parse(e.data)); setSyncStatus('ok'); }catch(_){} });
      es.onerror=()=>{ setSyncStatus('err'); };
    }catch(e){ console.warn('SSE no disponible',e); }

    return()=>{ if(esRef.current){ esRef.current.close(); esRef.current=null; } };
  },[session?.sucId, session?.rol]); // solo re-corre si cambia sucursal o rol

  function handleLogin(s){
    setSuc(null);
    setTab('mesas');
    setSession(s);
  }

  function logout(){
    setSession(null); setSuc(null); setAllData(null); setTab('mesas');
    if(esRef.current){ esRef.current.close(); esRef.current=null; }
  }

  if(!session) return <LoginScreen onLogin={handleLogin} sucursales={sucList}/>;

  if(!suc) return(
    <div className="app">
      <div className="topbar">
        <Brand/>
        <div className="topbar-right">
          <div className={`sync-dot ${syncStatus}`}/>
          <div className="topbar-user" onClick={logout}><div className="topbar-user-lbl">🚪 Salir</div></div>
        </div>
      </div>
      <div className="content">
        <div className="loading-screen">
          <div className="spinner"/>
          <div className="loading-txt">Cargando datos{syncStatus==='err'?' — error de conexión':'...'}</div>
          {syncStatus==='err'&&<button className="btn btn-primary" style={{marginTop:12}} onClick={()=>fetchSuc(session.sucId)}>Reintentar</button>}
        </div>
      </div>
    </div>
  );

  const tabs=session.rol==='admin'?ADMIN_TABS:CAJERO_TABS;
  const stockAlerts=suc.inventario.filter(i=>i.stock===0).length;

  return(
    <div className="app">
      <div className="topbar">
        <Brand/>
        <div className="topbar-center">
          <nav className="desktop-nav">
            {tabs.map(t=>(
              <button key={t} className={`dnav-btn${tab===t?' active':''}`} onClick={()=>setTab(t)}>
                {TAB_LABELS[t]}
                {t==='inventario'&&stockAlerts>0&&<span className="dnav-badge">{stockAlerts}</span>}
              </button>
            ))}
          </nav>
        </div>
        <div className="topbar-right">
          <div className={`sync-dot ${syncStatus}`} title={syncStatus==='ok'?'Sincronizado':syncStatus==='loading'?'Conectando...':'Sin conexión'}/>
          <span className="topbar-suc-name">{suc.nombre}</span>
          <Clock/>
          <div className="topbar-user" onClick={logout}>
            <div className="topbar-user-lbl">🚪 Salir</div>
          </div>
        </div>
      </div>

      <div className="content">
        {tab==='mesas'      &&<MesasTab      suc={suc} addToast={addToast} reload={reloadSuc}/>}
        {tab==='mostrador'  &&<MostradorTab  suc={suc} addToast={addToast} reload={reloadSuc}/>}
        {tab==='caja'       &&<CajaTab       suc={suc}/>}
        {tab==='inventario' &&<InventarioTab suc={suc} addToast={addToast} reload={reloadSuc}/>}
        {tab==='menu'       &&<MenuTab       suc={suc} addToast={addToast} reload={reloadSuc}/>}
        {tab==='reportes'   &&<ReportesTab   suc={suc}/>}
        {tab==='admin'      &&<AdminTab      suc={suc} allData={allData} addToast={addToast} reloadAll={reloadAll} reloadSuc={reloadSuc}/>}
      </div>

      <nav className="bottom-nav">
        <div className="bottom-nav-inner">
          {tabs.map(t=>(
            <button key={t} className={`bnav-btn${tab===t?' active':''}`} onClick={()=>setTab(t)}>
              <span className="bnav-icon">{TAB_ICONS[t]}</span>
              {t==='inventario'&&stockAlerts>0&&<span className="bnav-badge">{stockAlerts}</span>}
              {TAB_LABELS[t]}
            </button>
          ))}
        </div>
      </nav>

      {toast&&<Toast key={toast.key} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
